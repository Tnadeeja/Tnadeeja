name: Metrics
on:
  # Schedule updates (each hour)
  schedule: [{cron: "0 * * * *"}]
  # Lines below let you run workflow manually and on each commit (optional)
  workflow_dispatch:
  push: {branches: ["master", "main"]}
  
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Your GitHub token (required for private repositories and extra features)
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          
          # GitHub username to display metrics for (defaults to repository owner)
          user: Tnadeeja
          
          # Common options
          base: ""  # base metrics (optional)
          template: classic  # template to use (default: classic)
          
          # Plugins
          plugin_lines: yes
          plugin_traffic: yes
          plugin_people: yes
          plugin_activity: yes
          plugin_repositories: yes
          plugin_habits: yes
          plugin_contributors: yes
          plugin_isocalendar: yes
          plugin_languages: yes
          plugin_licenses: yes
          plugin_metadata: yes
          plugin_achievements: yes
          plugin_starlists: yes
          plugin_stargazers: yes
          plugin_starred: yes
          plugin_reactions: yes
          plugin_followup: yes
          plugin_blog: yes
          plugin_posts: yes
          plugin_rss: yes
          plugin_tweets: yes
          plugin_gists: yes
          plugin_anilist: yes
          plugin_music: yes
          plugin_wakatime: yes
          plugin_typing: yes
          plugin_skyline: yes
          
          # File options
          filename: github-metrics.svg
          
          # Output directory (relative to the repository root)
          output_directory: assets
          
          # Commit options
          commit_auto_push: true
          commit_author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          commit_message: "📊 Updated GitHub Metrics"
          
          # Other options
          config_timezone: Asia/Colombo
          config_display: ""
